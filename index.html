<!DOCTYPE html>
<html>
<head>
<title>Kimchi Run</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}
canvas{
display:block;
margin:auto;
background:#000;
}
.controls{
position:fixed;
bottom:10px;
width:100%;
display:flex;
justify-content:space-around;
}
button{
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#222;
color:white;
}
</style>
</head>
<body>

<canvas id="game" width="400" height="650"></canvas>

<div class="controls">
<button onclick="left()">⬅️</button>
<button onclick="jump()">⬆️</button>
<button onclick="right()">➡️</button>
<button onclick="resetGame()">🔄</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// LOAD YOUR SHIBA IMAGES
const frames = [];

let img1 = new Image();
img1.src = "Shiba1.png";

let img2 = new Image();
img2.src = "shiba2.png";

let img3 = new Image();
img3.src = "shiba3.png";

frames.push(img1);
frames.push(img2);
frames.push(img3);

// PLAYER
let lanes = [80,170,260];
let lane = 1;

let player = {
x: lanes[lane],
y: 500,
vy: 0,
jumping: false
};

// GAME ITEMS
let obstacles = [];
let score = 0;
let speed = 6;
let roadOffset = 0;

// SPAWN OBSTACLES
setInterval(()=>{
obstacles.push({
lane: Math.floor(Math.random()*3),
y: -50
});
},1000);

// CONTROLS
function left(){
if(lane>0) lane--;
}

function right(){
if(lane<2) lane++;
}

function jump(){
if(!player.jumping){
player.vy=-15;
player.jumping=true;
}
}

function resetGame(){
location.reload();
}

// DRAW ROAD
function drawRoad(){

ctx.fillStyle="#111";

ctx.beginPath();
ctx.moveTo(60,650);
ctx.lineTo(340,650);
ctx.lineTo(240,0);
ctx.lineTo(160,0);
ctx.closePath();
ctx.fill();

ctx.strokeStyle="#00ff99";
ctx.lineWidth=2;

for(let i=0;i<12;i++){
let y=(i*60+roadOffset)%650;

let lx=180-(y/3);
let rx=220+(y/3);

ctx.beginPath();
ctx.moveTo(lx,y);
ctx.lineTo(rx,y);
ctx.stroke();
}

roadOffset+=speed;
}

// MAIN LOOP
function loop(){

ctx.clearRect(0,0,400,650);

drawRoad();

// MOVE PLAYER
player.x += (lanes[lane]-player.x)*0.2;

// JUMP
player.y += player.vy;
player.vy += 1;

if(player.y>=500){
player.y=500;
player.vy=0;
player.jumping=false;
}

// RUNNING FRAME
let frame = Math.floor(Date.now()/120)%3;

// DRAW DOG
ctx.drawImage(
frames[frame],
player.x,
player.y,
60,
60
);

// DRAW OBSTACLES
obstacles.forEach((o,i)=>{

o.y += speed;

let ox = lanes[o.lane];

ctx.fillStyle="red";
ctx.fillRect(ox,o.y,40,40);

// COLLISION
if(
player.x<ox+40 &&
player.x+60>ox &&
player.y<o.y+40 &&
player.y+60>o.y
){
alert("Game Over! Score: "+score);
location.reload();
}

});

// UI
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("KIMCHI RUN",10,30);

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
