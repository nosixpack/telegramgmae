<!DOCTYPE html>
<html>
<head>
<title>Kimchi Run</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}
canvas{
display:block;
margin:auto;
background:#111;
}
.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-around;
flex-wrap:wrap;
}
button{
padding:15px 20px;
font-size:20px;
border:none;
border-radius:12px;
background:#333;
color:white;
margin:5px;
}
</style>
</head>
<body>

<canvas id="game" width="400" height="650"></canvas>

<div class="controls">
<button onclick="moveLeft()">⬅️</button>
<button onclick="jump()">⬆️</button>
<button onclick="slide()">⬇️</button>
<button onclick="moveRight()">➡️</button>
<button onclick="resetGame()">🔄</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const dogImg=new Image();
dogImg.src="IMG_20260413_160533_222.jpg";

let lanes=[70,165,260];
let currentLane=1;

let player={
x:lanes[currentLane],
y:500,
w:70,
h:70,
vy:0,
jumping:false,
sliding:false
};

let obstacles=[];
let coins=[];
let score=0;
let speed=6;
let bgOffset=0;

setInterval(()=>{
obstacles.push({
lane:Math.floor(Math.random()*3),
y:-50,
type:Math.random()>0.5?"high":"low"
});
},1000);

setInterval(()=>{
coins.push({
lane:Math.floor(Math.random()*3),
y:-20
});
},900);

function moveLeft(){
if(currentLane>0) currentLane--;
}

function moveRight(){
if(currentLane<2) currentLane++;
}

function jump(){
if(!player.jumping){
player.vy=-16;
player.jumping=true;
}
}

function slide(){
player.sliding=true;
player.h=40;

setTimeout(()=>{
player.sliding=false;
player.h=70;
},500);
}

function drawBackground(){
bgOffset+=speed;

ctx.fillStyle="#000";
ctx.fillRect(0,0,400,650);

// neon buildings
for(let i=0;i<8;i++){
ctx.fillStyle="#0ff";
ctx.fillRect(i*60,(bgOffset+i*40)%650,30,100);
}

for(let i=0;i<8;i++){
ctx.fillStyle="#f0f";
ctx.fillRect(i*55,((bgOffset+200)+i*50)%650,20,80);
}
}

function drawRoad(){
ctx.fillStyle="#222";

ctx.beginPath();
ctx.moveTo(100,650);
ctx.lineTo(300,650);
ctx.lineTo(250,0);
ctx.lineTo(150,0);
ctx.closePath();
ctx.fill();

ctx.strokeStyle="#00ff99";
ctx.lineWidth=2;

ctx.beginPath();
ctx.moveTo(166,650);
ctx.lineTo(183,0);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(233,650);
ctx.lineTo(216,0);
ctx.stroke();
}

function loop(){

ctx.clearRect(0,0,400,650);

drawBackground();
drawRoad();

// Smooth movement
player.x+=(lanes[currentLane]-player.x)*0.2;

// Jump physics
player.y+=player.vy;
player.vy+=1;

if(player.y>=500){
player.y=500;
player.vy=0;
player.jumping=false;
}

// Bounce effect
let bounce=Math.sin(Date.now()/100)*3;

ctx.drawImage(dogImg,player.x,player.y+bounce,70,player.h);

// Obstacles
obstacles.forEach((o,i)=>{
o.y+=speed;

let ox=lanes[o.lane];

ctx.fillStyle="red";

if(o.type==="high"){
ctx.fillRect(ox,o.y,50,60);
}else{
ctx.fillRect(ox,o.y+30,50,20);
}

if(
player.x<ox+50 &&
player.x+70>ox &&
player.y<o.y+60 &&
player.y+player.h>o.y
){
alert("Game Over! Score: "+score);
location.reload();
}
});

// Coins
coins.forEach((c,i)=>{
c.y+=speed;

let cx=lanes[c.lane];

ctx.fillStyle="gold";
ctx.beginPath();
ctx.arc(cx+20,c.y+20,12,0,Math.PI*2);
ctx.fill();

if(
player.x<cx+25 &&
player.x+70>cx &&
player.y<c.y+25 &&
player.y+player.h>c.y
){
score+=10;
coins.splice(i,1);
}
});

// UI
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("KIMCHI RUN",10,30);
ctx.fillText("Score: "+score,10,60);

speed+=0.001;

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
