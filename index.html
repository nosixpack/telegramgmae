<!DOCTYPE html>
<html>
<head>
<title>Shiba Uni Shooter</title>
<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
text-align:center;
}
canvas{
display:block;
margin:auto;
background:#222;
}
.controls{
position:fixed;
bottom:15px;
width:100%;
display:flex;
justify-content:space-around;
}
button{
padding:18px 25px;
font-size:22px;
border:none;
border-radius:12px;
background:#444;
color:white;
}
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>

<div class="controls">
<button id="leftBtn">⬅️</button>
<button id="shootBtn">🍖</button>
<button id="rightBtn">➡️</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player={
x:170,
y:500,
w:70,
h:70
};

let bullets=[];
let enemies=[];
let coins=[];
let score=0;
let lives=3;

const shibaImg=new Image();
shibaImg.src="IMG_20260413_160533_222.jpg"; // your image

// controls
document.getElementById("leftBtn").onclick=()=>player.x-=40;
document.getElementById("rightBtn").onclick=()=>player.x+=40;

document.getElementById("shootBtn").onclick=()=>{
bullets.push({x:player.x+25,y:player.y,w:10,h:20});
};

// spawn enemies
setInterval(()=>{
enemies.push({
x:Math.random()*350,
y:-40,
w:40,
h:40
});
},1000);

// spawn coins
setInterval(()=>{
coins.push({
x:Math.random()*350,
y:-30,
w:20,
h:20
});
},1500);

function loop(){

ctx.clearRect(0,0,400,600);
ctx.fillStyle="#222";
ctx.fillRect(0,0,400,600);

// PLAYER
ctx.drawImage(shibaImg,player.x,player.y,70,70);

// BULLETS (dog food)
bullets.forEach((b,i)=>{
b.y-=8;
ctx.fillText("🍖",b.x,b.y);

if(b.y<0) bullets.splice(i,1);
});

// ENEMIES
enemies.forEach((e,ei)=>{
e.y+=4;
ctx.fillText("🐈",e.x,e.y);

// collision bullet
bullets.forEach((b,bi)=>{
if(
b.x<e.x+e.w &&
b.x+b.w>e.x &&
b.y<e.y+e.h &&
b.y+b.h>e.y
){
enemies.splice(ei,1);
bullets.splice(bi,1);
score+=10;

// explosion effect
ctx.fillText("💥",e.x,e.y);
}
});

// collision player
if(
player.x<e.x+e.w &&
player.x+player.w>e.x &&
player.y<e.y+e.h &&
player.y+player.h>e.y
){
lives--;
enemies.splice(ei,1);
if(lives<=0){
alert("Game Over! Score: "+score);
location.reload();
}
}
});

// COINS
coins.forEach((c,ci)=>{
c.y+=4;
ctx.fillText("🪙",c.x,c.y);

if(
player.x<c.x+c.w &&
player.x+player.w>c.x &&
player.y<c.y+c.h &&
player.y+player.h>c.y
){
score+=5;
coins.splice(ci,1);
}

if(c.y>600) coins.splice(ci,1);
});

// UI
ctx.fillStyle="white";
ctx.font="18px Arial";
ctx.fillText("Score: "+score,10,20);
ctx.fillText("Lives: "+lives,10,45);

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
