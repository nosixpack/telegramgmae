    <!DOCTYPE html>
<html>
<head>
<title>Shiba Runner</title>
<style>
body{
margin:0;
overflow:hidden;
background:#222;
font-family:Arial;
}
canvas{
display:block;
margin:auto;
background:#444;
}
#restartBtn{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 30px;
font-size:20px;
}
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>
<button id="restartBtn">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const restartBtn = document.getElementById("restartBtn");

let player = {
x:180,
y:500,
w:50,
h:50
};

let obstacles=[];
let coins=[];
let score=0;
let highScore=localStorage.getItem("highScore") || 0;
let speed=4;
let lives=3;
let gameOver=false;
let roadOffset=0;

document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowLeft") player.x-=40;
if(e.key==="ArrowRight") player.x+=40;
});

canvas.addEventListener("touchstart",(e)=>{
let touchX=e.touches[0].clientX;
if(touchX<window.innerWidth/2){
player.x-=40;
}else{
player.x+=40;
}
});

setInterval(()=>{
if(!gameOver){
obstacles.push({
x:Math.random()*340,
y:-50,
w:50,
h:50
});
}
},1200);

setInterval(()=>{
if(!gameOver){
coins.push({
x:Math.random()*360,
y:-30,
w:30,
h:30
});
}
},2000);

function drawRoad(){
roadOffset+=speed;
ctx.fillStyle="#333";
ctx.fillRect(0,0,400,600);

ctx.strokeStyle="white";
ctx.lineWidth=5;

for(let i=-20;i<600;i+=40){
ctx.beginPath();
ctx.moveTo(200,i+roadOffset%40);
ctx.lineTo(200,i+20+roadOffset%40);
ctx.stroke();
}
}

function loop(){
ctx.clearRect(0,0,400,600);

drawRoad();

ctx.font="40px Arial";
ctx.fillText("🐕",player.x,player.y+40);

obstacles.forEach((o,i)=>{
o.y+=speed;
ctx.font="40px Arial";
ctx.fillText("🚗",o.x,o.y+40);

if(
player.x<o.x+o.w &&
player.x+player.w>o.x &&
player.y<o.y+o.h &&
player.y+player.h>o.y
){
obstacles.splice(i,1);
lives--;

if(lives<=0){
endGame();
}
}

if(o.y>600){
obstacles.splice(i,1);
score++;
speed+=0.1;
}
});

coins.forEach((c,i)=>{
c.y+=speed;
ctx.font="30px Arial";
ctx.fillText("🪙",c.x,c.y+30);

if(
player.x<c.x+c.w &&
player.x+player.w>c.x &&
player.y<c.y+c.h &&
player.y+player.h>c.y
){
coins.splice(i,1);
score+=5;
}

if(c.y>600){
coins.splice(i,1);
}
});

ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Score: "+score,10,30);
ctx.fillText("Lives: "+lives,10,60);
ctx.fillText("High: "+highScore,10,90);

if(!gameOver){
requestAnimationFrame(loop);
}
}

function endGame(){
gameOver=true;

if(score>highScore){
localStorage.setItem("highScore",score);
}

restartBtn.style.display="block";
}

restartBtn.onclick=()=>{
location.reload();
};

loop();
</script>

</body>
</html>
